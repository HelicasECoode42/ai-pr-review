name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
      language:
        description: "Output language (auto, en, or zh)"
        default: "auto"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reviewer from base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Syntax and encoding check
        run: python -m compileall src tests

      - name: Checkout PR head for diagnostics
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: _pr_head

      - name: Probe PR head Python syntax
        if: github.event_name == 'pull_request'
        id: pr_syntax
        continue-on-error: true
        run: |
          mkdir -p reports
          set +e
          python -m compileall _pr_head/src _pr_head/tests > reports/pr-syntax-check.txt 2>&1
          status=$?
          set -e
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          if [ "${status}" -ne 0 ]; then
            {
              echo "## PR Head Syntax Check"
              echo
              echo "The submitted PR head does not compile. The reviewer will still run from the base branch and analyze the PR diff."
              echo
              echo '```text'
              tail -n 80 reports/pr-syntax-check.txt
              echo '```'
              echo
            } > reports/pr-syntax-check.md
            exit "${status}"
          fi

      - name: Run AI PR Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          REVIEW_MODEL: ${{ secrets.REVIEW_MODEL }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          REPO="${{ github.repository }}"
          LANGUAGE="${{ inputs.language || 'auto' }}"
          LANGUAGE_ARGS=()
          if [ -n "${LANGUAGE}" ] && [ "${LANGUAGE}" != "auto" ]; then
            LANGUAGE_ARGS=(--language "${LANGUAGE}")
          fi

          AI_FLAG="--ai"
          if [ -z "${OPENAI_API_KEY}" ]; then
            AI_FLAG="--no-ai"
            echo "OPENAI_API_KEY not set (fork PR or missing secret); falling back to rule-only."
          fi

          REVIEWER_ARGS=()
          if uv run python -m src.cli.main --help | grep -q -- "--reviewer-version"; then
            REVIEWER_ARGS=(
              --reviewer-version "main-fallback"
              --execution-status "degraded"
              --degradation-reason "reviewer ran from PR base branch to isolate broken PR code"
              --report-confidence "fallback"
            )
          else
            echo "Checked-out reviewer does not support runtime metadata flags; continuing without them."
          fi

          REVIEW_META_ARGS=()
          if uv run python -m src.cli.main --help | grep -q -- "--reviewed-commit"; then
            REVIEW_META_ARGS=(
              --reviewed-commit "${{ github.event.pull_request.head.sha || github.sha }}"
              --trigger-event "${{ github.event_name }}"
              --workflow-run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            )
          else
            echo "Checked-out reviewer does not support review metadata flags; continuing without them."
          fi

          uv run python -m src.cli.main "${REPO}" "${PR_NUMBER}" \
            "${LANGUAGE_ARGS[@]}" \
            "${REVIEWER_ARGS[@]}" \
            "${REVIEW_META_ARGS[@]}" \
            ${AI_FLAG} \
            --output reports/pr-review.md

      - name: Append PR syntax diagnostics
        if: always() && github.event_name == 'pull_request' && steps.pr_syntax.outputs.exit_code != '0'
        run: |
          if [ -f reports/pr-review.md ] && [ -f reports/pr-syntax-check.md ]; then
            {
              echo
              cat reports/pr-syntax-check.md
            } >> reports/pr-review.md
          fi

      - name: Upload report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ai-pr-review-report
          path: |
            reports/pr-review.md
            reports/pr-review.json
            reports/pr-syntax-check.md
            reports/pr-syntax-check.txt
          retention-days: 30

      - name: Post inline review comments (high-confidence only)
        if: >-
          success() &&
          (github.event_name == 'pull_request') &&
          github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = "reports/pr-review.json";
            if (!fs.existsSync(path)) return;

            const report = JSON.parse(fs.readFileSync(path, "utf8"));
            const highConfidence = (report.suggestions || []).filter(
              s => s.confidence >= 0.85 && s.line != null
            );

            if (highConfidence.length === 0) {
              core.info("No high-confidence suggestions to post.");
              return;
            }

            const prNumber = context.payload.pull_request.number;
            const commitId = report.pr?.head_sha;
            if (!commitId) {
              core.warning("No head_sha in report; cannot post inline comments.");
              return;
            }

            core.info(`Posting ${highConfidence.length} inline review comment(s)...`);
            for (const s of highConfidence) {
              try {
                const body = `**${s.severity}** (${Math.round(s.confidence * 100)}%): ${s.title}\n\n${s.reason}\n\n> ${s.recommendation}`;
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  commit_id: commitId,
                  path: s.file_path,
                  line: s.line,
                  side: "RIGHT",
                  body: body,
                });
                core.info(`  ✓ ${s.file_path}:${s.line} — ${s.title}`);
              } catch (error) {
                core.warning(`  ✗ ${s.file_path}:${s.line} — ${error.message}`);
              }
            }

      - name: Post summary comment
        if: >-
          success() &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        with:
          script: |
            const fs = require("fs");
            const path = "reports/pr-review.json";
            if (!fs.existsSync(path)) {
              core.warning("No pr-review.json found; skipping summary comment.");
              return;
            }
            const report = JSON.parse(fs.readFileSync(path, "utf8"));
            const pr = report.pr || {};
            const files = report.files || [];
            const suggestions = report.suggestions || [];
            const ruleFindings = report.rule_findings || [];
            const completeness = report.completeness || [];
            const meta = report.review_meta || {};
            const artifactUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            // ── Helpers ──
            const riskEmoji = { low: "🟢", medium: "🟡", high: "🟠", critical: "🔴" };
            const riskLabel = { low: "低", medium: "中", high: "高", critical: "严重" };
            const sevEmoji = { low: "ℹ️", medium: "🟡", high: "🟠", critical: "🔴" };
            const statusEmoji = { success: "✅", partial: "⚠️", failed: "❌", skipped: "⏭️" };

            const risk = report.risk_level || "unknown";
            const additions = files.reduce((s, f) => s + (f.additions || 0), 0);
            const deletions = files.reduce((s, f) => s + (f.deletions || 0), 0);
            const aiStatus = report.used_ai
              ? (report.ai_failure_reason ? "⚠️ 降级" : "✅ 正常")
              : "⏭️ 未启用";
            const confLabel = {
              normal: "完整可信",
              fallback: "base 分支审查",
              partial: "部分分析",
              failed: "异常"
            };
            const confidence = confLabel[report.report_confidence] || report.report_confidence || "未知";

            // ── Build comment ──
            let body = "<!-- ai-pr-review-bot -->\n\n";
            body += "## 🤖 AI PR Review\n\n";
            body += `| | |\n|---|---|\n`;
            body += `| **风险等级** | ${riskEmoji[risk] || ""} **${riskLabel[risk] || risk}** |\n`;
            body += `| **变更文件** | ${files.length} 个 (+${additions}/-${deletions}) |\n`;
            body += `| **AI 状态** | ${aiStatus} |\n`;
            body += `| **可信度** | ${confidence} |\n`;
            if (report.hidden_suggestions_count > 0) {
              body += `| **已过滤** | ${report.hidden_suggestions_count} 条低置信/未变更行建议 |\n`;
            }
            if (report.context_truncated) {
              body += `| **上下文** | ⚠️ 超出 token 预算，部分文件未分析 |\n`;
            }
            body += `\n`;

            // ── Completeness (collapsible) ──
            if (completeness.length > 0) {
              body += "<details><summary>📊 分析完整性</summary>\n\n";
              body += "| 检查项 | 状态 | 说明 |\n|---|---|---|\n";
              for (const c of completeness) {
                body += `| ${c.item} | ${statusEmoji[c.status] || ""} | ${c.detail} |\n`;
              }
              body += "\n</details>\n\n";
            }

            // ── Top suggestions by severity (grouped, collapsible) ──
            if (suggestions.length > 0) {
              const grouped = { critical: [], high: [], medium: [], low: [] };
              for (const s of suggestions) {
                (grouped[s.severity] = grouped[s.severity] || []).push(s);
              }
              const order = ["critical", "high", "medium", "low"];
              const maxShow = 5;
              let shown = 0;

              body += `### 🔍 审查建议 (${suggestions.length} 条)\n\n`;

              for (const sev of order) {
                const group = grouped[sev] || [];
                if (group.length === 0) continue;

                if (shown >= maxShow) {
                  const remaining = suggestions.length - shown;
                  body += `> ... 还有 ${remaining} 条建议，详见完整报告\n`;
                  break;
                }

                if (shown === 0) {
                  // Show first few items expanded
                  for (const s of group) {
                    if (shown >= maxShow) break;
                    const pct = Math.round(s.confidence * 100);
                    body += `<details open><summary>${sevEmoji[sev] || ""} **${s.file_path}${s.line ? ":" + s.line : ""}** — ${s.title} (${pct}%)</summary>\n\n`;
                    body += `**原因**: ${s.reason}\n\n**建议**: ${s.recommendation}\n\n`;
                    body += `</details>\n\n`;
                    shown++;
                  }
                } else {
                  // Collapse remaining groups
                  body += `<details><summary>${sevEmoji[sev] || ""} ${riskLabel[sev] || sev} 严重度 — ${group.length} 条</summary>\n\n`;
                  for (const s of group) {
                    const pct = Math.round(s.confidence * 100);
                    body += `- **${s.file_path}${s.line ? ":" + s.line : ""}** ${s.title} (${pct}%)\n`;
                  }
                  body += `\n</details>\n\n`;
                  shown += group.length;
                }
              }
            } else if (ruleFindings.length > 0) {
              body += `### 🔍 规则命中 (${ruleFindings.length} 条)\n\n`;
              // Show up to 5 rule findings
              const showRules = ruleFindings.slice(0, 5);
              for (const r of showRules) {
                const line = r.line ? `:${r.line}` : "";
                body += `- **${r.file_path}${line}** — ${r.title}\n`;
              }
              if (ruleFindings.length > 5) {
                body += `\n> ... 还有 ${ruleFindings.length - 5} 条规则命中\n`;
              }
              body += `\n`;
            } else {
              body += `### ✅ 未发现问题\n\n`;
              body += `AI 审查和规则扫描均未发现需要关注的问题。\n\n`;
            }

            // ── Report summary ──
            if (report.summary) {
              body += `---\n\n### 📝 概要\n\n${report.summary}\n\n`;
            }

            // ── Footer ──
            body += `---\n\n`;
            if (meta.reviewed_commit) {
              body += `审查 commit: \`${meta.reviewed_commit.slice(0, 7)}\` · `;
            }
            body += `[📄 完整报告](${artifactUrl}) `;
            if (meta.trigger_event) {
              body += `· 触发: ${meta.trigger_event}`;
            }
            body += `\n`;

            // ── Post / Update comment ──
            const prNumber =
              context.payload.pull_request?.number ||
              parseInt(process.env.PR_NUMBER || "0", 10);

            if (!prNumber) return;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botMarker = "<!-- ai-pr-review-bot -->";
            const botLogin = "github-actions[bot]";
            const existing = comments.find(
              c => c.user?.login === botLogin && c.body?.includes(botMarker)
            );

            try {
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: body,
                });
                core.info("Updated existing bot summary comment.");
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: body,
                });
                core.info("Created new bot summary comment.");
              }
            } catch (error) {
              core.warning(`Failed to post PR comment: ${error.message}`);
            }

      - name: Fail if PR head has syntax errors
        if: always() && github.event_name == 'pull_request' && steps.pr_syntax.outputs.exit_code != '0'
        run: |
          echo "PR head syntax check failed. Review report was generated, but this PR should not be merged until the syntax errors are fixed."
          exit 1
