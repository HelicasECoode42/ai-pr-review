name: AI PR Review

on:
  workflow_call:
    inputs:
      pr_number:
        description: "PR number to review (optional; auto-detected for pull_request events)"
        required: false
        type: number
      language:
        description: "Output language (auto, en, or zh)"
        required: false
        type: string
        default: "zh"
    secrets:
      OPENAI_API_KEY:
        description: "OpenAI-compatible API key"
        required: true
      OPENAI_BASE_URL:
        description: "OpenAI-compatible base URL"
        required: false
      REVIEW_MODEL:
        description: "Model name for review"
        required: false
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
      language:
        description: "Output language (auto, en, or zh)"
        default: "zh"
      post_inline:
        description: "Post high-confidence suggestions as inline review comments"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reviewer from base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Validate PR number
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "Error: PR number is required but not provided."
            exit 1
          fi
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}

      - name: Syntax and encoding check
        run: python -m compileall src tests

      - name: Checkout PR head for diagnostics
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: _pr_head

      - name: Probe PR head Python syntax
        if: github.event_name == 'pull_request'
        id: pr_syntax
        continue-on-error: true
        run: |
          mkdir -p reports
          set +e
          python -m compileall _pr_head/src _pr_head/tests > reports/pr-syntax-check.txt 2>&1
          status=$?
          set -e
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          if [ "${status}" -ne 0 ]; then
            {
              echo "## PR Head Syntax Check"
              echo
              echo "The submitted PR head does not compile. The reviewer will still run from the base branch and analyze the PR diff."
              echo
              echo '```text'
              tail -n 80 reports/pr-syntax-check.txt
              echo '```'
              echo
            } > reports/pr-syntax-check.md
            exit "${status}"
          fi

      - name: Run AI PR Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          REVIEW_MODEL: ${{ secrets.REVIEW_MODEL }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number || '' }}"
          REPO="${{ github.repository }}"
          LANGUAGE="${{ inputs.language || 'zh' }}"
          LANGUAGE_ARGS=()
          if [ -n "${LANGUAGE}" ] && [ "${LANGUAGE}" != "auto" ]; then
            LANGUAGE_ARGS=(--language "${LANGUAGE}")
          fi

          AI_FLAG="--ai"
          if [ -z "${OPENAI_API_KEY}" ]; then
            AI_FLAG="--no-ai"
            echo "OPENAI_API_KEY not set (fork PR or missing secret); falling back to rule-only."
          fi

          REVIEWER_ARGS=()
          if uv run python -m src.cli.main --help | grep -q -- "--reviewer-version"; then
            REVIEWER_ARGS=(
              --reviewer-version "main-fallback"
              --execution-status "degraded"
              --degradation-reason "reviewer ran from PR base branch to isolate broken PR code"
              --report-confidence "fallback"
            )
          else
            echo "Checked-out reviewer does not support runtime metadata flags; continuing without them."
          fi

          REVIEW_META_ARGS=(
            --reviewed-commit "${{ github.event.pull_request.head.sha || github.sha }}"
            --trigger-event "${{ github.event_name }}"
            --workflow-run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          )

          uv run python -m src.cli.main "${REPO}" "${PR_NUMBER}" \
            "${LANGUAGE_ARGS[@]}" \
            "${REVIEWER_ARGS[@]}" \
            "${REVIEW_META_ARGS[@]}" \
            ${AI_FLAG} \
            --output reports/pr-review.md

      - name: Append PR syntax diagnostics
        if: always() && github.event_name == 'pull_request' && steps.pr_syntax.outputs.exit_code != '0'
        run: |
          if [ -f reports/pr-review.md ] && [ -f reports/pr-syntax-check.md ]; then
            {
              echo
              cat reports/pr-syntax-check.md
            } >> reports/pr-review.md
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-pr-review-report
          path: |
            reports/pr-review.md
            reports/pr-review.json
            reports/pr-syntax-check.md
            reports/pr-syntax-check.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Post inline review comments (high-confidence only — manual trigger only)
        if: >-
          always() &&
          github.event_name == 'workflow_dispatch' &&
          inputs.post_inline == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = "reports/pr-review.json";
            if (!fs.existsSync(path)) return;

            const report = JSON.parse(fs.readFileSync(path, "utf8"));
            const aiSuggestions = (report.suggestions || [])
              .filter(s => s.confidence >= 0.80 && s.line != null)
              .map(s => ({
                file_path: s.file_path,
                line: s.line,
                severity: s.severity,
                confidence: s.confidence,
                title: s.title,
                reason: s.reason,
                recommendation: s.recommendation,
                source: "AI",
              }));
            const ruleFindings = (report.rule_findings || [])
              .filter(r => (r.confidence ?? 0.7) >= 0.65 && r.line != null)
              .map(r => ({
                file_path: r.file_path,
                line: r.line,
                severity: r.severity,
                confidence: r.confidence ?? 0.7,
                title: r.title,
                reason: r.evidence,
                recommendation: r.recommendation,
                source: "Rule",
              }));
            const inlineComments = [...aiSuggestions, ...ruleFindings].slice(0, 10);

            if (inlineComments.length === 0) {
              core.info("No line-level suggestions or rule findings to post.");
              return;
            }

            const prNumber = context.payload.pull_request.number;
            const commitId = report.pr?.head_sha;
            if (!commitId) {
              core.warning("No head_sha in report; cannot post inline comments.");
              return;
            }

            core.info(`Posting ${inlineComments.length} inline review comment(s)...`);
            for (const s of inlineComments) {
              try {
                const body = `**${s.severity}** (${Math.round(s.confidence * 100)}%): ${s.title}\n\n${s.reason}\n\n> ${s.recommendation}`;
                await github.rest.pulls.createReviewComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  commit_id: commitId,
                  path: s.file_path,
                  line: s.line,
                  side: "RIGHT",
                  body: body,
                });
                core.info(`  ✓ ${s.file_path}:${s.line} — ${s.title}`);
              } catch (error) {
                core.warning(`  ✗ ${s.file_path}:${s.line} — ${error.message}`);
              }
            }

      - name: Post summary comment
        if: >-
          always() &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        with:
          script: |
            const fs = require("fs");
            const path = "reports/pr-review.md";
            if (!fs.existsSync(path)) {
              core.warning("No pr-review.md found; skipping summary comment.");
              return;
            }
            let body = "<!-- ai-pr-review-bot -->\n\n";
            const report = fs.readFileSync(path, "utf8");
            const lines = report.split("\n");
            const maxLines = 220;
            body += lines.slice(0, maxLines).join("\n");
            if (lines.length > maxLines) {
              const artifactUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
              body += "\n\n...\n\n";
              body += `> 完整报告请查看 [GitHub Actions Artifact](${artifactUrl}) 或下载 \`ai-pr-review-report\` artifact。\n`;
            }

            const prNumber =
              context.payload.pull_request?.number ||
              parseInt(process.env.PR_NUMBER || "0", 10);

            if (!prNumber) return;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botMarker = "<!-- ai-pr-review-bot -->";
            const botLogin = "github-actions[bot]";
            const existing = comments.find(
              c => c.user?.login === botLogin && c.body?.includes(botMarker)
            );

            try {
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: body,
                });
                core.info("Updated existing bot summary comment.");
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: body,
                });
                core.info("Created new bot summary comment.");
              }
            } catch (error) {
              core.warning(`Failed to post PR comment: ${error.message}`);
            }

      - name: Fail if PR head has syntax errors
        if: always() && github.event_name == 'pull_request' && steps.pr_syntax.outputs.exit_code != '0'
        run: |
          echo "PR head syntax check failed. Review report was generated, but this PR should not be merged until the syntax errors are fixed."
          exit 1
