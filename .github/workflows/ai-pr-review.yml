name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
      language:
        description: "Output language (en or zh)"
        default: "zh"

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run AI PR Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          REVIEW_MODEL: ${{ secrets.REVIEW_MODEL }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          REPO="${{ github.repository }}"
          LANGUAGE="${{ inputs.language || 'zh' }}"

          AI_FLAG="--ai"
          if [ -z "${OPENAI_API_KEY}" ]; then
            AI_FLAG="--no-ai"
            echo "OPENAI_API_KEY not set (fork PR or missing secret); falling back to rule-only."
          fi

          uv run python -m src.cli.main "${REPO}" "${PR_NUMBER}" \
            --language "${LANGUAGE}" \
            ${AI_FLAG} \
            --output reports/pr-review.md

      - name: Upload report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ai-pr-review-report
          path: reports/pr-review.md
          retention-days: 30

      - name: Post summary comment
        if: success()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        with:
          script: |
            const fs = require("fs");
            const report = fs.readFileSync("reports/pr-review.md", "utf8");
            const lines = report.split("\n");

            let commentBody = "";
            const maxLines = 80;
            for (let i = 0; i < Math.min(lines.length, maxLines); i++) {
              commentBody += lines[i] + "\n";
            }
            if (lines.length > maxLines) {
              commentBody += "\n\n...\n\n> 完整报告请查看 [GitHub Actions Artifact](";
              commentBody += `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}`;
              commentBody += `/actions/runs/${process.env.GITHUB_RUN_ID}) 或下载 `;
              commentBody += "`ai-pr-review-report` artifact。\n";
            }

            const prNumber =
              context.payload.pull_request?.number ||
              parseInt(process.env.PR_NUMBER || "0", 10);

            if (!prNumber) return;

            // Look for an existing bot comment to update
            const botMarker = "<!-- ai-pr-review-bot -->";
            commentBody = botMarker + "\n" + commentBody;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botLogin = "github-actions[bot]";
            const existing = comments.find(
              c => c.user?.login === botLogin && c.body?.includes(botMarker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody,
              });
            }
